name: Noon briefing batch

on:
  schedule:
    - cron: "20 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: briefing-state-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install ".[dev]"
      - run: python -m pytest -q
      - name: Run live batch
        env:
          MINIMAX_FOR_CODING_API_KEY: ${{ secrets.MINIMAX_FOR_CODING_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        run: python -m intelligence_briefing.cli --root "$GITHUB_WORKSPACE" --batch noon --trigger-type schedule --live
      - name: Commit generated state
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- data delivery)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data delivery
          git commit -m "chore: record noon briefing batch"
          git push origin "HEAD:${GITHUB_REF_NAME}"
