version: 1
minimax:
  secret_name: MINIMAX_FOR_CODING_API_KEY
  base_url: https://api.minimaxi.com/v1
  preferred_models:
    - MiniMax-M3
    - MiniMax-M2.7
  timeout_seconds: 45
  request_options:
    max_tokens: 512
    reasoning_split: true
    thinking:
      type: disabled
  role: default_normalization
kimi:
  secret_name: KIMI_API_KEY
  base_url: https://api.kimi.com/coding/v1
  preferred_models:
    - kimi-for-coding
  timeout_seconds: 45
  request_options:
    temperature: 1
    max_tokens: 512
  role: high_priority_ambiguity_only
  max_candidates_per_batch: 3
  sequential: true
